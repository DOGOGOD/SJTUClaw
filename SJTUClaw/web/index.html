<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SJTUClaw</title>
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<style>
/* ==========================================================================
   Reset & Variables — Claude-inspired warm, minimal palette
   ========================================================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-page:       #faf9f5;
  --bg-sidebar:    #f5f3ee;
  --bg-main:       #faf9f5;
  --bg-input:      #ffffff;
  --bg-hover:      #ede9e2;
  --bg-active:     #e6e0d6;
  --bg-assistant:  #f8f6f1;
  --bg-user:       #faf9f5;
  --bg-tool:       #fdfaf3;
  --accent:        #d97706;
  --accent-light:  #fef3c7;
  --accent-hover:  #b45309;
  --text-primary:  #1a1a1a;
  --text-secondary:#6b7280;
  --text-tertiary: #9ca3af;
  --border:        #e8e4db;
  --border-input:  #e0dcd4;
  --border-focus:  #d97706;
  --shadow-sm:     0 1px 2px rgba(0,0,0,.04);
  --shadow-md:     0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:     0 8px 32px rgba(0,0,0,.08);
  --radius-sm:     8px;
  --radius-md:     12px;
  --radius-lg:     20px;
  --radius-xl:     28px;
  --font-sans:     "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
  --font-mono:     "JetBrains Mono", "SF Mono", "Fira Code", "Consolas", monospace;
  --max-chat-w:    768px;
  --sidebar-w:     280px;
  --transition:    0.18s cubic-bezier(.4,0,.2,1);
}

html, body {
  height: 100%;
  font-family: var(--font-sans);
  background: var(--bg-page);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body { display: flex; overflow: hidden; }

/* ==========================================================================
   Sidebar
   ========================================================================== */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg-sidebar);
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  user-select: none;
}

.sidebar-header {
  padding: 20px 20px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar-header .logo-icon {
  width: 32px; height: 32px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, #d97706 0%, #ea580c 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  color: #fff;
  flex-shrink: 0;
}

.sidebar-header .title {
  font-size: 1.05rem;
  font-weight: 650;
  letter-spacing: -0.01em;
  color: var(--text-primary);
}

.btn-new-chat {
  margin: 0 16px 12px;
  padding: 10px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--bg-input);
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--text-primary);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all var(--transition);
}
.btn-new-chat:hover { background: var(--bg-hover); border-color: var(--accent); }
.btn-new-chat .plus { font-size: 1.2rem; font-weight: 300; line-height: 1; }

.session-list-area {
  flex: 1;
  overflow-y: auto;
  padding: 0 8px 8px;
}

.session-list-area::-webkit-scrollbar { width: 4px; }
.session-list-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.sidebar-label {
  padding: 8px 12px 4px;
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-tertiary);
}

.session-item {
  padding: 10px 12px;
  margin: 1px 4px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 0.85rem;
  line-height: 1.35;
  color: var(--text-primary);
  transition: background var(--transition);
  overflow: hidden;
}
.session-item:hover  { background: var(--bg-hover); }
.session-item.active { background: var(--bg-active); font-weight: 500; }
.session-item .item-title {
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.session-item .item-meta {
  font-size: 0.72rem;
  color: var(--text-tertiary);
  margin-top: 2px;
}

/* ---- Sidebar footer (attachments) ---- */
.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
}

.sidebar-footer .att-upload-label {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  font-size: 0.8rem;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition);
}
.sidebar-footer .att-upload-label:hover { background: var(--bg-hover); color: var(--text-primary); }
.sidebar-footer .att-upload-label svg { width: 16px; height: 16px; opacity: 0.6; }
.sidebar-footer input[type="file"] { display: none; }

.att-list { margin-top: 6px; }
.att-list .att-item {
  padding: 4px 12px;
  font-size: 0.75rem;
  color: var(--text-tertiary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ==========================================================================
   Main Chat Area
   ========================================================================== */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: var(--bg-main);
  position: relative;
}

/* ---- Top bar ---- */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px;
  border-bottom: 1px solid transparent;
  min-height: 52px;
}
.top-bar .session-title-display {
  font-size: 0.9rem;
  font-weight: 550;
  color: var(--text-primary);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.top-bar .session-meta {
  font-size: 0.78rem;
  color: var(--text-tertiary);
}

/* ---- Error toast ---- */
.error-toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: #fef2f2; color: #991b1b;
  border: 1px solid #fecaca;
  padding: 10px 20px; border-radius: var(--radius-md);
  font-size: 0.85rem;
  box-shadow: var(--shadow-md);
  z-index: 100;
  display: none;
  max-width: 520px; text-align: center;
  animation: slideDown 0.25s ease;
}
.error-toast.visible { display: block; }
@keyframes slideDown { from { opacity: 0; transform: translateX(-50%) translateY(-12px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

/* ---- Messages container ---- */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 32px 24px 40px;
}

.chat-area::-webkit-scrollbar { width: 5px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }

.chat-inner {
  max-width: var(--max-chat-w);
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

/* ---- Welcome ---- */
.welcome-block {
  text-align: center;
  padding: 80px 20px 40px;
}
.welcome-block .welcome-icon {
  width: 56px; height: 56px;
  border-radius: 16px;
  background: linear-gradient(135deg, #d97706 0%, #ea580c 100%);
  margin: 0 auto 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  color: #fff;
}
.welcome-block h2 {
  font-size: 1.5rem; font-weight: 600;
  letter-spacing: -0.02em; margin-bottom: 8px;
}
.welcome-block p {
  font-size: 0.95rem; color: var(--text-secondary);
  max-width: 400px; margin: 0 auto;
  line-height: 1.55;
}

/* ---- Individual message ---- */
.turn {
  display: flex;
  gap: 14px;
  padding: 16px 0;
  animation: fadeUp 0.25s ease;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.turn .avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.72rem; font-weight: 650;
  color: #fff;
  margin-top: 2px;
}
.turn.user .avatar      { background: #d97706; }
.turn.assistant .avatar { background: #92400e; }
.turn.tool .avatar      { background: #e5e7eb; color: var(--text-secondary); font-size: 0.65rem; }

.turn .bubble {
  flex: 1; min-width: 0;
  font-size: 0.9375rem;
  line-height: 1.68;
  color: var(--text-primary);
}

.turn.user .bubble {
  color: var(--text-primary);
}

.turn.tool .bubble {
  background: var(--bg-tool);
  border: 1px solid #fde68a;
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 0.8rem;
  font-family: var(--font-mono);
  color: var(--text-secondary);
  white-space: pre-wrap;
  max-height: 200px; overflow-y: auto;
  line-height: 1.45;
}

/* Markdown-like styling within assistant bubbles */
.turn .bubble p { margin: 0 0 0.6em; }
.turn .bubble p:last-child { margin-bottom: 0; }
.turn .bubble strong { font-weight: 600; }
.turn .bubble em { font-style: italic; }
.turn .bubble code {
  background: #f3f0ea; padding: 1px 5px; border-radius: 4px;
  font-family: var(--font-mono); font-size: 0.85em;
}
.turn .bubble pre {
  background: #f5f3ee; border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 16px;
  font-family: var(--font-mono); font-size: 0.82rem;
  overflow-x: auto; line-height: 1.5; margin: 0.6em 0;
}
.turn .bubble ul, .turn .bubble ol { padding-left: 1.5em; margin: 0.4em 0; }
.turn .bubble li { margin: 0.2em 0; }
.turn .bubble h1, .turn .bubble h2, .turn .bubble h3 {
  font-weight: 600; margin: 0.8em 0 0.3em; line-height: 1.3;
}
.turn .bubble h1 { font-size: 1.25rem; }
.turn .bubble h2 { font-size: 1.1rem; }
.turn .bubble h3 { font-size: 1rem; }
.turn .bubble hr {
  border: none; border-top: 1px solid var(--border); margin: 1em 0;
}
.turn .bubble blockquote {
  border-left: 3px solid var(--accent); padding-left: 14px;
  color: var(--text-secondary); margin: 0.6em 0;
}
.turn .bubble table {
  border-collapse: collapse; width: 100%; margin: 0.6em 0; font-size: 0.88rem;
}
.turn .bubble th, .turn .bubble td {
  border: 1px solid var(--border); padding: 6px 10px; text-align: left;
}
.turn .bubble th { background: var(--bg-hover); font-weight: 600; }
.turn .bubble a { color: var(--accent); text-decoration: underline; }
.turn .bubble a:hover { color: var(--accent-hover); }
.turn .bubble img { max-width: 100%; border-radius: var(--radius-sm); margin: 0.4em 0; }
.turn .bubble input[type="checkbox"] { margin-right: 6px; pointer-events: none; }

/* ---- Thinking indicator ---- */
.thinking-row {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 0; color: var(--text-tertiary); font-size: 0.85rem;
}

.typing-dots { display: flex; gap: 3px; }
.typing-dots span {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--text-tertiary);
  animation: dotBounce 1.2s infinite ease-in-out;
}
.typing-dots span:nth-child(2) { animation-delay: 0.16s; }
.typing-dots span:nth-child(3) { animation-delay: 0.32s; }
@keyframes dotBounce {
  0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
  30% { opacity: 1; transform: translateY(-4px); }
}

/* ---- System / Command result ---- */
.turn.system .bubble {
  background: #f5f3ee;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 0.85rem;
  color: var(--text-secondary);
  white-space: pre-wrap;
  font-family: var(--font-mono);
  line-height: 1.45;
}

/* ==========================================================================
   Input Area — Claude-style floating input
   ========================================================================== */
.input-area {
  padding: 0 24px 24px;
  background: var(--bg-main);
}

.input-inner {
  max-width: var(--max-chat-w);
  margin: 0 auto;
  background: var(--bg-input);
  border: 1px solid var(--border-input);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-sm);
  display: flex; align-items: flex-end;
  gap: 8px;
  padding: 8px 8px 8px 20px;
  transition: border var(--transition), box-shadow var(--transition);
}
.input-inner:focus-within {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px rgba(217,119,6,.10), var(--shadow-sm);
}

.input-inner textarea {
  flex: 1;
  border: none; outline: none; resize: none;
  font-family: var(--font-sans);
  font-size: 0.9375rem;
  line-height: 1.55;
  color: var(--text-primary);
  background: transparent;
  padding: 6px 0;
  max-height: 200px;
  min-height: 26px;
}
.input-inner textarea::placeholder { color: var(--text-tertiary); }

.send-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all var(--transition);
}
.send-btn:hover  { background: var(--accent-hover); }
.send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.send-btn svg { width: 16px; height: 16px; }

/* ---- Disclaimer ---- */
.disclaimer {
  text-align: center; padding: 6px 24px 10px;
  font-size: 0.7rem; color: var(--text-tertiary);
}

/* ---- Session item inline actions ---- */
.session-item { position: relative; display: flex; align-items: center; justify-content: space-between; }
.session-item .item-text { flex:1; min-width:0; }
.session-item .item-actions { display: none; gap: 2px; flex-shrink: 0; margin-left: 6px; }
.session-item:hover .item-actions { display: flex; }
.item-actions button { width: 24px; height: 24px; border: none; border-radius: 4px; background: transparent; cursor: pointer; font-size: 0.7rem; color: var(--text-tertiary); display: flex; align-items: center; justify-content: center; transition: all var(--transition); }
.item-actions button:hover { background: var(--bg-active); color: var(--text-primary); }
.item-actions button.danger:hover { background: #fee2e2; color: #dc2626; }

/* ---- Settings ---- */
.sidebar-header .btn-settings { margin-left: auto; background: none; border: none; cursor: pointer; font-size: 1rem; padding: 4px 6px; border-radius: 6px; color: var(--text-tertiary); transition: all var(--transition); }
.sidebar-header .btn-settings:hover { background: var(--bg-hover); color: var(--text-primary); }

.settings-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 200; display: none; align-items: center; justify-content: center; }
.settings-overlay.open { display: flex; }
.settings-panel { background: var(--bg-input); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); width: 680px; max-width: 94vw; max-height: 82vh; display: flex; flex-direction: column; overflow: hidden; animation: fadeUp 0.2s ease; }
.settings-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 1rem; }
.settings-header button { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--text-tertiary); padding: 2px 6px; border-radius: 4px; }
.settings-header button:hover { background: var(--bg-hover); color: var(--text-primary); }
.settings-tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 20px; }
.settings-tab { padding: 10px 16px; font-size: 0.85rem; cursor: pointer; border: none; border-bottom: 2px solid transparent; color: var(--text-secondary); transition: all var(--transition); background: none; }
.settings-tab:hover { color: var(--text-primary); }
.settings-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
.settings-body { flex: 1; overflow-y: auto; padding: 20px; }
.settings-body textarea { width: 100%; min-height: 200px; border: 1px solid var(--border-input); border-radius: var(--radius-sm); padding: 12px; font-family: var(--font-mono); font-size: 0.85rem; line-height: 1.5; resize: vertical; outline: none; }
.settings-body textarea:focus { border-color: var(--border-focus); }
.settings-body .btn-primary { margin-top: 12px; padding: 8px 20px; border: none; border-radius: var(--radius-sm); background: var(--accent); color: #fff; font-weight: 500; cursor: pointer; font-size: 0.85rem; transition: all var(--transition); }
.settings-body .btn-primary:hover { background: var(--accent-hover); }
.settings-body .btn-sm { padding: 4px 12px; font-size: 0.78rem; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-input); cursor: pointer; transition: all var(--transition); margin-right: 4px; }
.settings-body .btn-sm:hover { background: var(--bg-hover); }
.settings-body .btn-sm.danger { color: #ef4444; border-color: #fecaca; }
.settings-body .btn-sm.danger:hover { background: #fee2e2; }

.memory-item { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.memory-item .mem-content { flex: 1; font-size: 0.88rem; line-height: 1.5; }
.memory-item .mem-meta { font-size: 0.72rem; color: var(--text-tertiary); }
.add-row { display: flex; gap: 8px; margin-bottom: 16px; }
.add-row input { flex: 1; padding: 8px 12px; border: 1px solid var(--border-input); border-radius: var(--radius-sm); font-size: 0.88rem; outline: none; }
.add-row input:focus { border-color: var(--border-focus); }

.session-admin-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 12px; }
.session-admin-item .sess-info { flex:1; min-width:0; }
.session-admin-item .sess-title { font-size: 0.88rem; font-weight: 500; }
.session-admin-item .sess-meta { font-size: 0.75rem; color: var(--text-tertiary); }

/* ---- Tasks ---- */
.task-create-form { background: var(--bg-hover); border-radius: var(--radius-sm); padding: 16px; margin-bottom: 16px; }
.task-create-form label { display: block; font-size: 0.78rem; font-weight: 600; margin-bottom: 3px; color: var(--text-secondary); }
.task-create-form input, .task-create-form textarea, .task-create-form select { width: 100%; padding: 8px 10px; border: 1px solid var(--border-input); border-radius: var(--radius-sm); font-size: 0.85rem; margin-bottom: 10px; outline: none; font-family: var(--font-sans); }
.task-create-form input:focus, .task-create-form textarea:focus, .task-create-form select:focus { border-color: var(--border-focus); }
.task-create-form textarea { min-height: 50px; resize: vertical; }
.task-create-form .form-row { display: flex; gap: 8px; }
.task-create-form .form-row > * { flex: 1; }

.task-item { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; }
.task-item .task-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.task-item .task-content { font-size: 0.88rem; font-weight: 500; }
.task-item .task-meta { font-size: 0.73rem; color: var(--text-tertiary); margin-top: 4px; }
.task-item .task-history { margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); font-size: 0.8rem; }
.task-item .task-history summary { cursor: pointer; color: var(--text-secondary); font-weight: 500; margin-bottom: 6px; }
.task-item .history-entry { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.78rem; }
.task-item .history-entry:last-child { border-bottom: none; }
.task-item .history-entry .h-time { color: var(--text-tertiary); }
.task-item .history-entry .h-reply { margin-top: 4px; color: var(--text-primary); white-space: pre-wrap; max-height: 200px; overflow-y: auto; font-family: var(--font-mono); }
.task-item .history-entry .h-error { color: #dc2626; }

.status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; }
.status-badge.waiting  { background: #fef3c7; color: #92400e; }
.status-badge.running  { background: #dbeafe; color: #1e40af; }
.status-badge.completed { background: #d1fae5; color: #065f46; }
.status-badge.cancelled { background: #f3f4f6; color: #6b7280; }
.status-badge.failed   { background: #fee2e2; color: #991b1b; }

/* ==========================================================================
   Responsive
   ========================================================================== */
@media (max-width: 720px) {
  .sidebar { display: none; }
  .chat-area { padding: 20px 12px 32px; }
  .input-area { padding: 0 12px 16px; }
  .turn .avatar { width: 26px; height: 26px; font-size: 0.62rem; }
}
</style>
</head>
<body>

<!-- ======================================================================
     Sidebar
     ====================================================================== -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo-icon">🦞</div>
    <span class="title">SJTUClaw</span>
    <button class="btn-settings" onclick="openSettings()" title="设置">⚙</button>
  </div>

  <button class="btn-new-chat" onclick="createSession()">
    <span class="plus">+</span> 新对话
  </button>

  <div class="sidebar-label">历史对话</div>
  <div class="session-list-area" id="session-list"></div>

  <div class="sidebar-footer">
    <label class="att-upload-label" for="file-input">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
      </svg>
      上传附件
    </label>
    <input type="file" id="file-input" onchange="uploadAttachment()">
    <div class="att-list" id="att-list"></div>
  </div>
</aside>

<!-- ======================================================================
     Scripts
     ====================================================================== -->
<script>
// =========================================================================
// State
// =========================================================================
const API = 'http://127.0.0.1:8000';
let currentSessionId = null;
let currentSessionTitle = '';

// =========================================================================
// Init
// =========================================================================
(async () => {
  await loadSessions();
  const items = document.querySelectorAll('.session-item');
  if (items.length > 0) items[0].click();
})();

// =========================================================================
// Sessions
// =========================================================================
async function loadSessions() {
  try {
    const res = await fetch(API + '/sessions');
    const data = await res.json();
    if (!data.ok) { toast(data.error); return; }
    renderSessionList(data.sessions);
  } catch (e) { toast('无法连接到 Gateway: ' + e.message); }
}

function renderSessionList(sessions) {
  const el = document.getElementById('session-list');
  if (!sessions || !sessions.length) {
    el.innerHTML = '<div style="padding:12px 16px;font-size:0.8rem;color:var(--text-tertiary)">暂无对话</div>';
    return;
  }
  el.innerHTML = sessions.map(s => `
    <div class="session-item${s.sessionId === currentSessionId ? ' active' : ''}">
      <div class="item-text" onclick="switchSession('${escAttr(s.sessionId)}', '${escAttr(s.title)}')">
        <div class="item-title">${esc(s.title || s.sessionId)}</div>
        <div class="item-meta">${s.messageCount} 条消息 · ${fmtTime(s.updatedAt)}</div>
      </div>
      <div class="item-actions" onclick="event.stopPropagation()">
        <button title="重命名" onclick="renameSessionPrompt('${escAttr(s.sessionId)}')">✎</button>
        <button class="danger" title="删除" onclick="deleteSessionConfirm('${escAttr(s.sessionId)}')">✕</button>
      </div>
    </div>
  `).join('');
}

async function createSession() {
  try {
    const res = await fetch(API + '/sessions', { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' });
    const data = await res.json();
    if (!data.ok) { toast(data.error); return; }
    await loadSessions();
    switchSession(data.sessionId, data.title);
  } catch (e) { toast('创建失败: ' + e.message); }
}

async function switchSession(sid, title) {
  currentSessionId = sid;
  currentSessionTitle = title || sid;

  document.querySelectorAll('.session-item').forEach(el => {
    el.classList.toggle('active', el.querySelector('.item-title')?.textContent === (title || sid) ||
                                 el.textContent.trim().startsWith(sid));
  });

  document.getElementById('session-title-display').textContent = currentSessionTitle;
  await loadMessages();
  await loadAttachments();
  document.getElementById('msg-input').focus();
}

// =========================================================================
// Messages
// =========================================================================
async function loadMessages() {
  const inner = document.getElementById('chat-inner');
  if (!currentSessionId) {
    inner.innerHTML = `<div class="welcome-block"><div class="welcome-icon">🦞</div><h2>你好，我是 Claw</h2><p>选择一个已有对话或创建新对话开始吧。</p></div>`;
    return;
  }
  try {
    const res = await fetch(API + '/sessions/' + currentSessionId + '/messages');
    const data = await res.json();
    if (!data.ok) { toast(data.error); return; }
    if (!data.messages || !data.messages.length) {
      inner.innerHTML = `<div class="welcome-block"><div class="welcome-icon">🦞</div><h2>开始新的对话</h2><p>输入你的问题，Claw 会帮你找到答案。</p></div>`;
      document.getElementById('session-meta').textContent = '';
      return;
    }
    inner.innerHTML = data.messages.map((m,i,arr) => renderTurn(m,i,arr)).join('');
    document.getElementById('session-meta').textContent = `${data.messages.length} 条消息`;
  } catch (e) { toast('加载消息失败: ' + e.message); }
}

function renderTurn(m, idx, all) {
  const role = m.role;
  let cls, avatarLetter, content;

  if (role === 'user') {
    cls = 'user'; avatarLetter = 'U'; content = esc(m.content);
  } else if (role === 'tool') {
    cls = 'tool'; avatarLetter = 'T';
    try {
      const obj = JSON.parse(m.content);
      content = esc(JSON.stringify(obj, null, 2));
    } catch(_) { content = esc(m.content); }
  } else if (role === 'system') {
    cls = 'system'; avatarLetter = '⚡'; content = esc(m.content);
  } else {
    cls = 'assistant'; avatarLetter = 'C';
    content = mdToHtml(m.content);
  }

  return `<div class="turn ${cls}">
    <div class="avatar">${avatarLetter}</div>
    <div class="bubble">${content}</div>
  </div>`;
}

// Simple Markdown-to-HTML converter
// Markdown renderer — uses marked.js (loaded via CDN)
(function initMarked() {
  if (typeof marked === 'undefined') return;
  marked.setOptions({
    breaks: true,
    gfm: true,
  });
  // Open external links in new tab
  const renderer = new marked.Renderer();
  renderer.link = function(href, title, text) {
    const titleAttr = title ? ' title="' + escAttr(title) + '"' : '';
    return '<a href="' + href + '"' + titleAttr + ' target="_blank" rel="noopener">' + text + '</a>';
  };
  renderer.image = function(href, title, text) {
    const titleAttr = title ? ' title="' + escAttr(title) + '"' : '';
    return '<img src="' + href + '" alt="' + text + '"' + titleAttr + ' style="max-width:100%">';
  };
  marked.use({ renderer });
})();

function mdToHtml(text) {
  if (!text) return '';
  if (typeof marked !== 'undefined') {
    try {
      return marked.parse(text);
    } catch (_) { /* fall through to plain text */ }
  }
  // Fallback: simple escape + newline-to-br
  return esc(text).replace(/\n/g, '<br>');
}

// =========================================================================
// Chat
// =========================================================================
function handleKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

async function sendMessage() {
  const textarea = document.getElementById('msg-input');
  const btn = document.getElementById('send-btn');
  const msg = textarea.value.trim();
  if (!msg) return;

  // Detect CLI commands — route to /command endpoint
  const isCmd = /^\/(session|memory|compact|exit|task|tasks)\b/.test(msg);

  textarea.value = '';
  textarea.style.height = 'auto';
  textarea.disabled = true;
  btn.disabled = true;

  const inner = document.getElementById('chat-inner');
  const welcome = inner.querySelector('.welcome-block');
  if (welcome) welcome.remove();

  // Optimistic user turn
  inner.insertAdjacentHTML('beforeend', renderTurn({role:'user',content:msg}, -1, []));

  if (isCmd) {
    // ---- Command path (no LLM call) ----
    try {
      const body = { command: msg };
      if (currentSessionId) body.sessionId = currentSessionId;

      const res = await fetch(API + '/command', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
      const data = await res.json();

      if (!data.ok) {
        toast(data.error || '命令执行失败');
        textarea.disabled = false; btn.disabled = false; return;
      }

      // Show command result as system message
      inner.insertAdjacentHTML('beforeend',
        renderTurn({role:'system',content:data.result}, -1, []));
      scrollDown();

      // Handle actions
      await handleCommandActions(data);
    } catch (e) {
      toast('命令请求失败: ' + e.message);
    }
  } else {
    // ---- Normal chat path ----
    const thinkId = 'think-' + Date.now();
    inner.insertAdjacentHTML('beforeend',
      `<div class="thinking-row" id="${thinkId}">
        <div class="avatar" style="width:30px;height:30px;border-radius:50%;background:#92400e;font-size:0.72rem;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;">C</div>
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>`);
    scrollDown();

    try {
      const body = { message: msg };
      if (currentSessionId) body.sessionId = currentSessionId;

      const res = await fetch(API + '/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
      const data = await res.json();

      document.getElementById(thinkId)?.remove();

      if (!data.ok) {
        toast(data.error || '请求失败');
        textarea.disabled = false; btn.disabled = false; return;
      }

      if (!currentSessionId || currentSessionId !== data.sessionId) {
        currentSessionId = data.sessionId;
        await loadSessions();
      }

      await loadMessages();
      await loadSessions();
      document.getElementById('session-title-display').textContent = currentSessionTitle || currentSessionId || '';
    } catch (e) {
      document.getElementById(thinkId)?.remove();
      toast('请求失败: ' + e.message);
    }
  }

  textarea.disabled = false;
  btn.disabled = false;
  textarea.focus();
}

async function handleCommandActions(data) {
  const actions = data.actions || [];
  for (const act of actions) {
    switch (act) {
      case 'reload_sessions':
        await loadSessions();
        break;
      case 'switch_session':
        if (data.switchToSessionId) {
          const sid = data.switchToSessionId;
          // Find title from sidebar
          const items = document.querySelectorAll('.session-item');
          let title = sid;
          items.forEach(el => {
            if (el.querySelector('.item-title')?.textContent && el.textContent.trim().startsWith(sid)) {
              title = el.querySelector('.item-title').textContent;
            }
          });
          switchSession(sid, title);
        }
        break;
      case 'reload_messages':
        await loadMessages();
        break;
      case 'clear_session':
        currentSessionId = null;
        currentSessionTitle = '';
        document.getElementById('session-title-display').textContent = 'SJTUClaw';
        document.getElementById('session-meta').textContent = '';
        document.getElementById('chat-inner').innerHTML =
          `<div class="welcome-block"><div class="welcome-icon">🦞</div><h2>你好，我是 Claw</h2><p>选择一个已有对话或创建新对话开始吧。</p></div>`;
        await loadSessions();
        break;
    }
  }
}

function scrollDown() {
  const area = document.getElementById('chat-area');
  requestAnimationFrame(() => { area.scrollTop = area.scrollHeight; });
}

// =========================================================================
// Attachments
// =========================================================================
async function uploadAttachment() {
  const fileInput = document.getElementById('file-input');
  const file = fileInput.files[0];
  if (!file || !currentSessionId) return;

  const form = new FormData();
  form.append('file', file);

  try {
    const res = await fetch(API + '/sessions/' + currentSessionId + '/attachments', { method:'POST', body:form });
    const data = await res.json();
    if (!data.ok) { toast(data.error); return; }
    await loadAttachments();
  } catch (e) { toast('上传失败: ' + e.message); }
  fileInput.value = '';
}

async function loadAttachments() {
  const el = document.getElementById('att-list');
  if (!currentSessionId) { el.innerHTML = ''; return; }
  try {
    const res = await fetch(API + '/sessions/' + currentSessionId + '/attachments');
    const data = await res.json();
    if (!data.ok || !data.attachments || !data.attachments.length) {
      el.innerHTML = '';
      return;
    }
    el.innerHTML = data.attachments.map(a =>
      `<div class="att-item" title="${escAttr(a.originalName)}">📎 ${esc(a.originalName)}</div>`
    ).join('');
  } catch (e) {}
}

// =========================================================================
// Toast
// =========================================================================
function toast(msg) {
  const el = document.getElementById('error-toast');
  el.textContent = msg;
  el.classList.add('visible');
  clearTimeout(el._timeout);
  el._timeout = setTimeout(() => el.classList.remove('visible'), 6000);
}

// =========================================================================
// Helpers
// =========================================================================
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function fmtTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    const now = new Date();
    const pad = n => String(n).padStart(2,'0');
    const time = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    if (d.toDateString() === now.toDateString()) return time;
    const diff = Math.floor((now - d) / 86400000);
    if (diff === 1) return '昨天 ' + time;
    if (diff < 7) return `${diff} 天前`;
    return `${d.getMonth()+1}/${d.getDate()} ${time}`;
  } catch(_) { return iso; }
}

// =========================================================================
// Settings Panel
// =========================================================================
let _settingsTab = 'sp';

function openSettings() {
  document.getElementById('settings-overlay').classList.add('open');
  switchSettingsTab(_settingsTab);
}

function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
}

function switchSettingsTab(tab) {
  _settingsTab = tab;
  document.querySelectorAll('.settings-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  const body = document.getElementById('settings-body');

  if (tab === 'sp')       renderSystemPromptTab(body);
  else if (tab === 'soul') renderSoulTab(body);
  else if (tab === 'memory') renderMemoryTab(body);
  else if (tab === 'sessions') renderSessionsTab(body);
  else if (tab === 'tasks')  renderTasksTab(body);
}

// -- System Prompt tab ------------------------------------------------------
async function renderSystemPromptTab(body) {
  const data = await (await fetch(API + '/admin/system-prompt')).json();
  body.innerHTML = `
    <textarea id="sp-textarea">${esc(data.content)}</textarea>
    <button class="btn-primary" onclick="saveSystemPrompt()">保存</button>
    <span id="sp-status" style="margin-left:12px;font-size:0.85rem;color:var(--text-tertiary)"></span>`;
}

async function saveSystemPrompt() {
  const content = document.getElementById('sp-textarea').value.trim();
  if (!content) return;
  const res = await fetch(API + '/admin/system-prompt', {
    method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({content})
  });
  const data = await res.json();
  document.getElementById('sp-status').textContent = data.ok ? '已保存' : '保存失败';
  if (data.ok) setTimeout(() => { const s = document.getElementById('sp-status'); if(s) s.textContent=''; }, 2000);
}

// -- Soul tab ----------------------------------------------------------------
async function renderSoulTab(body) {
  const data = await (await fetch(API + '/admin/soul')).json();
  body.innerHTML = `
    <textarea id="soul-textarea">${esc(data.content)}</textarea>
    <button class="btn-primary" onclick="saveSoul()">保存</button>
    <span id="soul-status" style="margin-left:12px;font-size:0.85rem;color:var(--text-tertiary)"></span>`;
}

async function saveSoul() {
  const content = document.getElementById('soul-textarea').value.trim();
  if (!content) return;
  const res = await fetch(API + '/admin/soul', {
    method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({content})
  });
  const data = await res.json();
  document.getElementById('soul-status').textContent = data.ok ? '已保存' : '保存失败';
  if (data.ok) setTimeout(() => { const s = document.getElementById('soul-status'); if(s) s.textContent=''; }, 2000);
}

// -- Memory tab --------------------------------------------------------------
async function renderMemoryTab(body) {
  const data = await (await fetch(API + '/memories')).json();
  let html = `
    <div class="add-row">
      <input type="text" id="mem-input" placeholder="输入新的记忆内容…" onkeydown="if(event.key==='Enter')addMemory()">
      <button class="btn-primary" style="margin:0;white-space:nowrap" onclick="addMemory()">添加</button>
    </div>`;
  if (data.memories && data.memories.length) {
    html += data.memories.map(m => `
      <div class="memory-item">
        <div class="mem-content">${esc(m.content)}<div class="mem-meta">${m.id} · ${fmtTime(m.createdAt)}</div></div>
        <button class="btn-sm danger" onclick="deleteMemory('${escAttr(m.id)}')">删除</button>
      </div>`).join('');
  } else {
    html += '<div style="color:var(--text-tertiary);font-size:0.85rem;padding:12px 0;">暂无记忆</div>';
  }
  body.innerHTML = html;
}

async function addMemory() {
  const input = document.getElementById('mem-input');
  const content = input.value.trim();
  if (!content) return;
  await fetch(API + '/memories', {
    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({content})
  });
  input.value = '';
  renderMemoryTab(document.getElementById('settings-body'));
}

async function deleteMemory(id) {
  if (!confirm('确定删除这条记忆？')) return;
  await fetch(API + '/memories/' + encodeURIComponent(id), { method: 'DELETE' });
  renderMemoryTab(document.getElementById('settings-body'));
}

// -- Sessions tab ------------------------------------------------------------
async function renderSessionsTab(body) {
  const data = await (await fetch(API + '/sessions')).json();
  if (!data.sessions || !data.sessions.length) {
    body.innerHTML = '<div style="color:var(--text-tertiary);font-size:0.85rem;padding:12px 0;">暂无会话</div>';
    return;
  }
  body.innerHTML = data.sessions.map(s => `
    <div class="session-admin-item">
      <div class="sess-info">
        <div class="sess-title">${esc(s.title || s.sessionId)}</div>
        <div class="sess-meta">${s.sessionId} · ${s.messageCount} 条消息 · ${fmtTime(s.updatedAt)}</div>
      </div>
      <div class="sess-actions">
        <button class="btn-sm" onclick="renameSessionAdmin('${escAttr(s.sessionId)}')">重命名</button>
        <button class="btn-sm danger" onclick="deleteSessionFromAdmin('${escAttr(s.sessionId)}')">删除</button>
      </div>
    </div>`).join('');
}

async function renameSessionAdmin(sid) {
  const title = prompt('新标题：');
  if (!title || !title.trim()) return;
  await fetch(API + '/sessions/' + encodeURIComponent(sid), {
    method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({title: title.trim()})
  });
  await loadSessions();
  renderSessionsTab(document.getElementById('settings-body'));
}

async function deleteSessionFromAdmin(sid) {
  if (!confirm('确定删除会话 ' + sid + '？此操作不可撤销。')) return;
  await fetch(API + '/sessions/' + encodeURIComponent(sid), { method: 'DELETE' });
  if (currentSessionId === sid) {
    currentSessionId = null;
    document.getElementById('chat-inner').innerHTML = `<div class="welcome-block"><div class="welcome-icon">🦞</div><h2>你好，我是 Claw</h2><p>选择一个已有对话或创建新对话开始吧。</p></div>`;
    document.getElementById('session-title-display').textContent = 'SJTUClaw';
    document.getElementById('session-meta').textContent = '';
  }
  await loadSessions();
  renderSessionsTab(document.getElementById('settings-body'));
}

// -- Sidebar inline actions -------------------------------------------------
function renameSessionPrompt(sid) {
  const title = prompt('新标题：');
  if (!title || !title.trim()) return;
  fetch(API + '/sessions/' + encodeURIComponent(sid), {
    method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({title: title.trim()})
  }).then(() => { loadSessions(); if (currentSessionId === sid) { currentSessionTitle = title.trim(); document.getElementById('session-title-display').textContent = title.trim(); } });
}

function deleteSessionConfirm(sid) {
  if (!confirm('确定删除会话 ' + sid + '？此操作不可撤销。')) return;
  fetch(API + '/sessions/' + encodeURIComponent(sid), { method: 'DELETE' }).then(() => {
    if (currentSessionId === sid) {
      currentSessionId = null;
      document.getElementById('chat-inner').innerHTML = `<div class="welcome-block"><div class="welcome-icon">🦞</div><h2>你好，我是 Claw</h2><p>选择一个已有对话或创建新对话开始吧。</p></div>`;
      document.getElementById('session-title-display').textContent = 'SJTUClaw';
      document.getElementById('session-meta').textContent = '';
    }
    loadSessions();
  });
}

// =========================================================================
// Tasks
// =========================================================================
async function renderTasksTab(body) {
  let data;
  try {
    data = await (await fetch(API + '/tasks')).json();
  } catch (e) {
    body.innerHTML = `<div style="color:#dc2626;padding:20px;text-align:center">无法连接 Gateway：${esc(e.message)}</div>`;
    return;
  }
  if (!data.ok) {
    body.innerHTML = `<div style="color:#dc2626;padding:20px;text-align:center">${esc(data.error||'加载失败')}</div>`;
    return;
  }
  const sid = currentSessionId || 'default';
  let html = `<details class="task-create-form" open>
      <summary style="font-weight:600;font-size:0.85rem;cursor:pointer;margin-bottom:10px">＋ 创建新任务</summary>
      <label>任务内容（到期后发给 LLM 的消息）</label>
      <textarea id="tf-content" placeholder="例如：总结今天的对话…"></textarea>
      <label>触发类型</label>
      <select id="tf-type" onchange="onTaskTypeChange()">
        <option value="once">一次性 (once)</option>
        <option value="interval">固定间隔 (interval)</option>
        <option value="daily">每天定时 (daily)</option>
      </select>
      <label>触发规则</label>
      <input type="text" id="tf-rule" placeholder="2026-07-06T15:30:00+00:00">
      <div style="font-size:0.72rem;color:var(--text-tertiary);margin-bottom:10px">once: ISO时间 &nbsp; interval: 秒数(≥10) &nbsp; daily: HH:MM</div>
      <label>所属 Session</label>
      <input type="text" id="tf-session" value="${escAttr(sid)}">
      <button class="btn-primary" onclick="createTask()">创建任务</button>
      <span id="tf-status" style="margin-left:10px;font-size:0.8rem;color:var(--text-tertiary)"></span>
    </details>`;
  if (data.tasks && data.tasks.length) {
    html += data.tasks.map(t => renderTaskItem(t)).join('');
  } else {
    html += '<div style="color:var(--text-tertiary);font-size:0.85rem;padding:20px 0;text-align:center">暂无定时任务</div>';
  }
  body.innerHTML = html;
}

function renderTaskItem(t) {
  const h = (t.executionHistory || []);
  let hh = '';
  if (h.length) {
    hh = `<details class="task-history"><summary>执行历史 (${h.length} 次)</summary>`;
    hh += h.map(e => `<div class="history-entry">
        <div class="h-time">${fmtTime(e.executedAt)} · ${e.status==='success'?'OK':'FAIL'}</div>
        ${e.reply?'<div class="h-reply">'+esc(e.reply.slice(0,300))+(e.reply.length>300?'…':'')+'</div>':''}
        ${e.error?'<div class="h-error">'+esc(e.error.slice(0,200))+'</div>':''}
      </div>`).join('');
    hh += '</details>';
  }
  const cc = t.status==='waiting'||t.status==='running';
  const done = t.status==='completed'||t.status==='cancelled'||t.status==='failed';
  return `<div class="task-item">
    <div class="task-header"><span class="task-content">${esc(t.content)}</span><span class="status-badge ${t.status}">${t.status}</span></div>
    <div class="task-meta">${t.id} · ${t.triggerType} · 规则:${esc(String(t.triggerRule))} · 下次:${fmtTime(t.nextRunAt)} · ${esc(t.sessionId)}</div>
    ${hh}
    <div style="margin-top:8px;display:flex;gap:6px">
      ${cc?`<button class="btn-sm danger" onclick="cancelTask('${escAttr(t.id)}')">取消</button>`:''}
      ${done?`<button class="btn-sm danger" onclick="deleteTask('${escAttr(t.id)}')">删除</button>`:''}
    </div>
  </div>`;
}

function onTaskTypeChange() {
  const t = document.getElementById('tf-type').value;
  const r = document.getElementById('tf-rule');
  if (t==='once') r.placeholder='2026-07-06T15:30:00+00:00';
  else if (t==='interval') r.placeholder='300 (每5分钟)';
  else r.placeholder='09:00';
}

async function createTask() {
  const content = document.getElementById('tf-content').value.trim();
  const tt = document.getElementById('tf-type').value;
  const tr = document.getElementById('tf-rule').value.trim();
  const sid = document.getElementById('tf-session').value.trim()||'default';
  const s = document.getElementById('tf-status');
  if (!content||!tr) { s.textContent='请填写完整'; return; }
  const res = await fetch(API+'/tasks',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({content,triggerType:tt,triggerRule:tr,sessionId:sid})
  });
  const d = await res.json();
  if (d.ok) { s.textContent='创建成功'; renderTasksTab(document.getElementById('settings-body')); }
  else s.textContent='失败: '+(d.detail||d.error||'error');
}

async function cancelTask(id) {
  if (!confirm('取消任务 '+id+'？')) return;
  await fetch(API+'/tasks/'+encodeURIComponent(id)+'/cancel',{method:'POST'});
  renderTasksTab(document.getElementById('settings-body'));
}

async function deleteTask(id) {
  if (!confirm('删除任务 '+id+'？执行历史也会被清除。')) return;
  await fetch(API+'/tasks/'+encodeURIComponent(id),{method:'DELETE'});
  renderTasksTab(document.getElementById('settings-body'));
}
</script>
</body>
</html>
